<section id="projects" class="section">
  <div class="container">
    <div class="section-header">
      <span class="section-label">Portfólio</span>
      <h2 class="section-title">Projetos Destacados</h2>
      <p class="section-subtitle">
        Uma seleção técnica dos meus trabalhos e contribuições recentes na área de desenvolvimento.
      </p>
    </div>

    <div class="projects-grid">
      @for (project of projects; track project.title) {
        <div class="project-card card">
          <div class="project-emoji">{{ project.emoji }}</div>
          <h3 class="project-title">{{ project.title }}</h3>
          <p class="project-desc">{{ project.description }}</p>
          <div class="project-tags">
            @for (tag of project.tags; track tag) {
              <span class="project-tag">{{ tag }}</span>
            }
          </div>

        </div>
      }
    </div>
  </div>
</section>
