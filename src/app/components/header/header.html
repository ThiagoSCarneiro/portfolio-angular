<header id="header" [class.scrolled]="isScrolled()">
  <nav class="container nav">
    <a href="#hero" class="logo">
      <span class="logo-bracket">&lt;</span>
      <span class="logo-text">Thiago</span>
      <span class="logo-bracket">/&gt;</span>
    </a>

    <ul class="nav-links" [class.active]="isMobileMenuOpen()">
      @for (link of navLinks; track link.href) {
        <li>
          <a [href]="link.href" class="nav-link" (click)="closeMobileMenu()">
            {{ link.label }}
          </a>
        </li>
      }
    </ul>

    <div class="nav-actions">
      <button 
        class="theme-toggle" 
        (click)="themeService.toggleTheme()" 
        [attr.aria-label]="(themeService.isDarkMode$ | async) ? 'Mudar para tema claro' : 'Mudar para tema escuro'">
        @if (themeService.isDarkMode$ | async) {
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" class="theme-icon" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        } @else {
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" class="theme-icon" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        }
      </button>

      <button
        class="mobile-toggle"
        (click)="toggleMobileMenu()"
        [attr.aria-label]="isMobileMenuOpen() ? 'Fechar menu' : 'Abrir menu'"
        [class.active]="isMobileMenuOpen()">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
    </div>
  </nav>
</header>
